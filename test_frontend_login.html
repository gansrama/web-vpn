<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
        }
        .error {
            color: red;
            margin-top: 10px;
            padding: 10px;
            background: #ffebee;
            border: 1px solid #f44336;
            border-radius: 4px;
        }
        .success {
            color: green;
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 4px;
        }
        .test-accounts {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h2>Login Test Page</h2>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit" id="loginBtn">Login</button>
    </form>
    
    <div id="message"></div>
    
    <div class="test-accounts">
        <h3>Akun Test:</h3>
        <ul>
            <li>Email: admin@timdev.com, Password: password</li>
            <li>Email: user@timdev.com, Password: password</li>
            <li>Email: test@example.com, Password: password</li>
        </ul>
        <p><strong>Coba login dengan akun yang tidak ada untuk testing error!</strong></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const messageDiv = document.getElementById('message');
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            messageDiv.innerHTML = '';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = `
                        <div class="success">
                            <strong>Login Berhasil!</strong><br>
                            User: ${data.user.name}<br>
                            Email: ${data.user.email}<br>
                            Session ID: ${data.session_id}
                        </div>
                    `;
                } else {
                    messageDiv.innerHTML = `
                        <div class="error">
                            <strong>Login Gagal!</strong><br>
                            ${data.message}
                        </div>
                    `;
                }
            } catch (error) {
                messageDiv.innerHTML = `
                    <div class="error">
                        <strong>Terjadi kesalahan!</strong><br>
                        ${error.message}
                    </div>
                `;
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
