version: '3.8'

services:
    app:
        volumes:
            - ./:/var/www/html
            - ./storage/app/public:/var/www/html/storage/app/public
            - ./storage/logs:/var/www/html/storage/logs
        environment:
            - APP_DEBUG=true
            - APP_ENV=local

    mysql:
        ports:
            - "3306:3306"
        environment:
            - MYSQL_ROOT_PASSWORD=root_password

    redis:
        ports:
            - "6379:6379"

    node:
        volumes:
            - ./:/var/www/html
            - /var/www/html/node_modules
        environment:
            - NODE_ENV=development

    phpmyadmin:
        ports:
            - "8080:80"

    mailhog:
        ports:
            - "1025:1025"
            - "8025:8025"
