version: '3.8'

services:
    # Laravel Application
    app:
        image: php:8.2-fpm
        container_name: webform-vpn-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        networks:
            - webform-vpn-network
        depends_on:
            - postgres
            - redis
        environment:
            - APP_NAME=Webform VPN
            - APP_ENV=local
            - APP_KEY=base64:QsfY21rA4YXWLy/JNEuMI0iq7Y/uJFIPgFIwLBWSOEk=
            - APP_DEBUG=true
            - APP_URL=http://localhost:8000
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=webform_vpn
            - DB_USERNAME=webform_vpn
            - DB_PASSWORD=webform_vpn_password

    # PostgreSQL Database
    postgres:
        image: postgres:15-alpine
        container_name: webform-vpn-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: webform_vpn
            POSTGRES_USER: webform_vpn
            POSTGRES_PASSWORD: webform_vpn_password
            POSTGRES_HOST_AUTH_METHOD: trust
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        networks:
            - webform-vpn-network

    # Redis Cache
    redis:
        image: redis:7-alpine
        container_name: webform-vpn-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - webform-vpn-network

    # Nginx Web Server
    nginx:
        image: nginx:alpine
        container_name: webform-vpn-nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - webform-vpn-network

    # Node.js for Vite Development
    node:
        image: node:18-alpine
        container_name: webform-vpn-node
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - /var/www/html/node_modules
        ports:
            - "5173:5173"
        networks:
            - webform-vpn-network
        command: npm run dev

    # pgAdmin
    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: webform-vpn-pgadmin
        restart: unless-stopped
        ports:
            - "8081:80"
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@example.com
            PGADMIN_DEFAULT_PASSWORD: admin_password
            PGADMIN_CONFIG_SERVER_MODE: 'False'
        depends_on:
            - postgres
        networks:
            - webform-vpn-network

networks:
    webform-vpn-network:
        driver: bridge

volumes:
    postgres_data:
        driver: local
    redis_data:
        driver: local
